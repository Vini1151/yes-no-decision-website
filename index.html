<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Yes Or No</title>
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <h1>YES OR NO</h1>
        <p class="description">Take a help for choosing a right decision.</p>
        <div class="container">
        <div class="yes-button" id="yesBtn">YES</div>
        <h2 class="or">OR</h2>
        <div class="no-button" id="noBtn">NO</div>
        </div>
        <button class="decide-btn" onclick="results()">DECIDE</button>
        <p id="result">Your best decision:</p>

        <script src="script.js"></script>
    </body>
</html>
